{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm mt-4">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">申請真房東認證</h4>
            </div>
            <div class="card-body">
                <p class="text-muted">上傳您的身分證與房屋權狀，平台審核通過後，您的刊登物件將顯示「真房東認證」標章。為保護隱私，上傳的圖片會自動壓上「僅供租屋平台審核使用」浮水印。</p>
                
                <form action="{{ url_for('verification.apply') }}" method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="id_card" class="form-label fw-bold">身分證影本</label>
                        <input type="file" class="form-control" id="id_card" name="id_card" accept=".jpg,.jpeg,.png,.pdf" required>
                        <div class="form-text">請上傳清晰的身分證正面圖檔。支援 JPG, PNG, PDF。</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="property_cert" class="form-label fw-bold">房屋權狀影本（或仲介證照）</label>
                        <input type="file" class="form-control" id="property_cert" name="property_cert" accept=".jpg,.jpeg,.png,.pdf" required>
                        <div class="form-text">請上傳清楚的房屋所有權狀或合法仲介證照。支援 JPG, PNG, PDF。</div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">送出認證申請</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

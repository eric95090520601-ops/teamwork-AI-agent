{% extends "base.html" %}

{% block content %}
<div class="payment-flow animate-fade-in" style="max-width: 800px; margin: 0 auto;">
    <header class="page-header" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem;">
        <div>
            <h1>⚖️ 發起爭議仲裁</h1>
            <p class="subtitle">租約案號: #{{ lease_id }}</p>
        </div>
        <a href="{{ url_for('payment.index') }}" class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.9rem;">
            ← 返回儀表板
        </a>
    </header>

    <div class="glass-card" style="padding: 2.5rem;">
        <form method="POST" enctype="multipart/form-data">
            <!-- 爭議原因 -->
            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="reason" style="font-size: 1.1rem; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem;">
                    🔴 請詳細描述您的爭議原因與主張
                </label>
                <textarea class="input-field" id="reason" name="reason" rows="5" 
                    placeholder="例如：退租時房東要求扣除不合理清潔費 3,000 元，但入住點交時該污損即已存在，且有照片為證。希望能取回全額押金..." required style="width: 100%; font-family: inherit; font-size: 0.95rem; resize: vertical;"></textarea>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 2rem 0;">

            <!-- 照片上傳區 -->
            <h3 style="font-size: 1.2rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
                📸 提供屋況對比證據照片
            </h3>
            <p class="subtitle" style="margin-bottom: 1.5rem; font-size: 0.85rem;">
                請分別上傳入住時點交的屋況照片與退租時的損壞/爭議照片，以便平台管理員進行快速且公正的對比裁決。
            </p>

            <div class="card-grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">
                <!-- 入住點交照片 -->
                <div class="glass-card" style="background: rgba(255, 255, 255, 0.02); border: 2px dashed var(--glass-border); padding: 1.5rem; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.75rem;">
                    <span style="font-size: 2.2rem;">🔑</span>
                    <label for="move_in_photos" style="font-weight: 600; color: var(--text-primary); cursor: pointer;">
                        入住時點交照片
                    </label>
                    <p class="subtitle" style="font-size: 0.75rem; margin-bottom: 0.5rem;">（可選取多張，僅限圖片）</p>
                    <input type="file" id="move_in_photos" name="move_in_photos" class="input-field" accept="image/*" multiple style="font-size: 0.85rem; width: 100%; background: transparent; border: none; padding: 0.25rem 0;">
                </div>

                <!-- 退租屋況照片 -->
                <div class="glass-card" style="background: rgba(255, 255, 255, 0.02); border: 2px dashed var(--glass-border); padding: 1.5rem; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.75rem;">
                    <span style="font-size: 2.2rem;">📦</span>
                    <label for="move_out_photos" style="font-weight: 600; color: var(--text-primary); cursor: pointer;">
                        退租時屋況照片
                    </label>
                    <p class="subtitle" style="font-size: 0.75rem; margin-bottom: 0.5rem;">（可選取多張，僅限圖片）</p>
                    <input type="file" id="move_out_photos" name="move_out_photos" class="input-field" accept="image/*" multiple style="font-size: 0.85rem; width: 100%; background: transparent; border: none; padding: 0.25rem 0;">
                </div>
            </div>

            <!-- 提醒資訊 -->
            <div style="background: var(--warning-bg); border: 1px solid rgba(251, 191, 36, 0.2); border-radius: var(--radius-md); padding: 1rem 1.25rem; margin-bottom: 2rem; color: var(--warning); font-size: 0.85rem; line-height: 1.5; display: flex; gap: 0.5rem;">
                <span style="font-size: 1.1rem;">⚠️</span>
                <span>
                    <strong>安全性提醒：</strong>所有上傳的相片都將自動嵌入防篡改時間戳記，確保證據真實可靠。提供愈清晰的局部對比，愈有助於加快速審！
                </span>
            </div>

            <!-- 提交按鈕 -->
            <button type="submit" class="btn btn-primary btn-block btn-glow" style="padding: 1rem; font-size: 1.05rem; font-weight: 700; width: 100%;">
                🛡️ 一鍵發起仲裁並上傳存證
            </button>
        </form>
    </div>
</div>
{% endblock %}

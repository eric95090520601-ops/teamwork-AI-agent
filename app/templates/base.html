<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>租屋網站 - 智能爭議與報修中心</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            --accent-grad: linear-gradient(135deg, #ec4899 0%, #d946ef 100%);
            --bg-grad: radial-gradient(circle at 10% 20%, rgba(242, 246, 253, 1) 0%, rgba(224, 233, 246, 1) 90.1%);
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.4);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 10px 30px -10px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 40px -15px rgba(0, 0, 0, 0.12);
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', 'SF Pro TC', 'Noto Sans TC', sans-serif;
            background: var(--bg-grad);
            background-attachment: fixed;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 3rem;
        }

        h1, h2, h3, h4, h5, h6, .brand-font {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        }

        /* Glassmorphism Navbar */
        .navbar {
            background: rgba(15, 23, 42, 0.85) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: var(--shadow-md);
            padding: 0.8rem 0;
            transition: all 0.3s ease;
        }

        .navbar-brand {
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
            background: linear-gradient(120deg, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link {
            font-weight: 500;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.75) !important;
            transition: all 0.2s ease;
            padding: 0.5rem 1rem !important;
            border-radius: 8px;
        }

        .nav-link:hover {
            color: #fff !important;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Container & Cards */
        .container {
            max-width: 1140px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            box-shadow: var(--shadow-md);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .card-header {
            background: rgba(255, 255, 255, 0.4);
            border-bottom: 1px solid var(--glass-border);
            font-weight: 600;
            padding: 1.2rem 1.5rem;
        }

        .card-body {
            padding: 1.5rem 2rem;
        }

        /* Buttons & Forms */
        .btn {
            border-radius: 12px;
            padding: 0.6rem 1.5rem;
            font-weight: 600;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--primary-grad);
            border: none;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.35);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        .btn-danger {
            background: var(--accent-grad);
            border: none;
            box-shadow: 0 4px 14px rgba(236, 72, 153, 0.35);
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, #d946ef 0%, #c084fc 100%);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.5);
        }

        .btn-outline-secondary {
            border-color: #cbd5e1;
            color: #475569;
        }

        .btn-outline-secondary:hover {
            background-color: #f1f5f9;
            color: #1e293b;
            border-color: #94a3b8;
        }

        .form-control, .form-select {
            border-radius: 12px;
            border: 1.5px solid #cbd5e1;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            background-color: rgba(255, 255, 255, 0.8);
        }

        .form-control:focus, .form-select:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            background-color: #fff;
        }

        /* Badges */
        .badge {
            padding: 0.5em 0.8em;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .bg-warning {
            background-color: #fef3c7 !important;
            color: #d97706 !important;
            border: 1px solid #fde68a;
        }

        .bg-success {
            background-color: #dcfce7 !important;
            color: #15803d !important;
            border: 1px solid #bbf7d0;
        }

        .bg-info {
            background-color: #e0f2fe !important;
            color: #0369a1 !important;
            border: 1px solid #bae6fd;
        }

        /* Evidences comparison */
        .photo-card {
            border-radius: 14px !important;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .photo-card:hover {
            transform: scale(1.03) !important;
            box-shadow: var(--shadow-md) !important;
        }

        /* Table Beautification */
        .table {
            --bs-table-bg: transparent;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        .table thead th {
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 20px;
        }

        .table tbody tr {
            background: rgba(255, 255, 255, 0.6);
            box-shadow: var(--shadow-sm);
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .table tbody tr:hover {
            background: rgba(255, 255, 255, 0.85);
            transform: scale(1.005);
        }

        .table td {
            padding: 16px 20px;
            vertical-align: middle;
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
        }

        .table td:first-child {
            border-left: 1px solid var(--glass-border);
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
        }

        .table td:last-child {
            border-right: 1px solid var(--glass-border);
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-5">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-houses-fill"></i>
                <span class="brand-font">租屋仲裁與報修中心</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="bi bi-house-door-fill me-1"></i> 首頁</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/repairs/"><i class="bi bi-wrench-adjustable-circle me-1"></i> 報修與溝通</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/disputes"><i class="bi bi-shield-lock-fill me-1"></i> 管理員後台</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container animate-fade-in">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-info border-0 shadow-sm rounded-4 mb-4 d-flex align-items-center" role="alert">
                  <i class="bi bi-info-circle-fill me-2 fs-5"></i>
                  <div>{{ message }}</div>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

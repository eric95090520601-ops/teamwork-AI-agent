{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="d-flex align-items-center gap-3 mb-4">
            <a href="{{ url_for('repair.list_repairs') }}" class="btn btn-outline-secondary btn-sm rounded-circle p-2 d-flex align-items-center justify-content-center" style="width: 38px; height: 38px;">
                <i class="bi bi-arrow-left fs-5"></i>
            </a>
            <div>
                <h2 class="mb-0">發起修繕報修</h2>
                <p class="text-muted mb-0">登入身份：{{ user.username }}</p>
            </div>
        </div>

        <div class="card border-0 shadow-lg rounded-4">
            <div class="card-body p-4 p-md-5">
                <form action="{{ url_for('repair.create_repair') }}" method="post" enctype="multipart/form-data">
                    <!-- 損壞物品名稱 -->
                    <div class="mb-4">
                        <label for="item_name" class="form-label fs-5 fw-bold mb-2">
                            <i class="bi bi-wrench-adjustable text-primary me-2"></i>損壞物品名稱
                        </label>
                        <input type="text" id="item_name" name="item_name" class="form-control rounded-3" required placeholder="例如：客廳大金冷氣、衛浴水龍頭漏水">
                    </div>

                    <!-- 詳細描述 -->
                    <div class="mb-4">
                        <label for="description" class="form-label fs-5 fw-bold mb-2">
                            <i class="bi bi-file-text text-primary me-2"></i>損壞情形詳細描述
                        </label>
                        <textarea id="description" name="description" class="form-control rounded-3" rows="4" placeholder="請詳細描述物品損壞的具體情況、損壞發生的時間，以利對方快速了解並安排修繕..."></textarea>
                    </div>

                    <hr class="my-4 text-muted opacity-25">

                    <!-- 照片上傳區 -->
                    <h5 class="fw-bold mb-3"><i class="bi bi-images text-indigo me-2"></i>上傳修繕對比照片</h5>
                    <p class="text-muted small mb-4">建議同時上傳物品原本的正常狀態（選填）以及目前的損壞狀態（必填），以便雙方比對折舊與責任範圍。</p>

                    <div class="row g-4">
                        <!-- 原本狀態照片 -->
                        <div class="col-md-6">
                            <div class="p-3 rounded-4 border border-2 border-dashed bg-light text-center h-100 d-flex flex-column justify-content-center">
                                <i class="bi bi-shield-check text-success fs-2 mb-2"></i>
                                <label for="original" class="form-label fw-bold mb-1">原本狀態照片/影片</label>
                                <p class="text-muted small mb-3">（選填，入住時點交照）</p>
                                <input type="file" id="original" name="original" class="form-control btn-light" accept="image/*,video/*" multiple>
                            </div>
                        </div>

                        <!-- 損壞狀態照片 -->
                        <div class="col-md-6">
                            <div class="p-3 rounded-4 border border-2 border-dashed bg-light text-center h-100 d-flex flex-column justify-content-center" style="border-color: rgba(236, 72, 153, 0.3) !important;">
                                <i class="bi bi-exclamation-triangle-fill text-danger fs-2 mb-2"></i>
                                <label for="broken" class="form-label fw-bold mb-1">損壞狀態照片/影片</label>
                                <p class="text-muted small mb-3">（必填，目前的損壞照）</p>
                                <input type="file" id="broken" name="broken" class="form-control btn-light" accept="image/*,video/*" multiple required>
                            </div>
                        </div>
                    </div>

                    <!-- 提交按鈕 -->
                    <div class="mt-5 pt-2 text-end">
                        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 py-3">
                            <i class="bi bi-check-circle-fill me-2"></i>送出修繕報修申請
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .border-dashed {
        border-style: dashed !important;
        border-color: #cbd5e1 !important;
        background-color: rgba(248, 250, 252, 0.6) !important;
        transition: all 0.2s ease;
    }
    .border-dashed:hover {
        border-color: #6366f1 !important;
        background-color: rgba(248, 250, 252, 0.9) !important;
    }
</style>
{% endblock %}
